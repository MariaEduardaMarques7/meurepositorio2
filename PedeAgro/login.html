<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedeAgro - Login</title>
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-wrapper">
            
            <!-- Lado Esquerdo: Logo Realizada -->
            <div class="login-logo-side">
                <img src="Logo 1.png" alt="Logo PedeAgro" class="main-logo-img">
            </div>

            <!-- Lado Direito: Formulário -->
            <div class="login-form-side">
                <h2>Bem vindo ao PedeAgro!</h2>
                <h1>Faça seu Login</h1>
                
                <form action="telainicial.html">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Insira seu email" class="login-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" placeholder="Insira sua senha" class="login-input" required>
                    </div>
                    
                    <button type="submit" class="btn-entrar">Entrar</button>
                    
                    <p class="signup-text">
                        Ainda não possui uma conta? <a href="#">Cadastre-se</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
